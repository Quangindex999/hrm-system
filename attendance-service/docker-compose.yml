version: '3.8'

services:
  # SQL Server Database
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "YourPassword123!"
      ACCEPT_EULA: "Y"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourPassword123!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Attendance API Service
  attendance-api:
    image: attendance-service:latest
    build:
      context: .
      dockerfile: API/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ConnectionStrings__DefaultConnection=Server=mssql,1433;Database=AttendanceDB;User Id=sa;Password=YourPassword123!;Encrypt=False;TrustServerCertificate=True;
      - ASPNETCORE_ENVIRONMENT=Production
      - ExternalServices__HrServiceUrl=https://172.16.6.17:7084
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - attendance-network
    restart: unless-stopped

  # RabbitMQ (Message Queue)
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlserver_data:
  rabbitmq_data:

networks:
  attendance-network:
    driver: bridge

# Usage:
# docker-compose up -d          # Start all services
# docker-compose down           # Stop all services
# docker-compose logs -f        # Follow logs
# docker-compose ps             # Show service status
