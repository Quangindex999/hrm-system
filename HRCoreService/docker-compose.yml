version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password@123
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: HRCoreService/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__HRCoreDB=Server=db;Database=HRCoreDB;User Id=sa;Password=Password@123;TrustServerCertificate=True;MultipleActiveResultSets=true;
    depends_on:
      - db

volumes:
  sqldata:
