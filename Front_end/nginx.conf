server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cấu hình gzip để tăng tốc độ tải trang
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy tới HR Service
    location /api-hr/ {
        proxy_pass ${VITE_HR_URL}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_verify off;
    }

    # Proxy tới Attendance Service
    location /api-attend/ {
        proxy_pass ${VITE_ATTEND_URL}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_verify off;
    }

    # Proxy tới Payroll Service
    location /api-payroll/ {
        proxy_pass ${VITE_PAYROLL_URL}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_verify off;
    }

    # Xử lý Vue Router (history mode) - fallback về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache các file static (js, css, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
