version: '3.8'

services:

  payroll-db:
    image: mysql:8.0
    container_name: payroll-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456789Mquan@
      MYSQL_DATABASE: payrolldb
    ports:
      - "3307:3306"
    volumes:
      - payroll-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456789Mquan@"]
      interval: 10s
      timeout: 5s
      retries: 10

  payroll-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payroll-service
    restart: always
    ports:
      - "5000:5000"
      - "7300:7300"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:5000
      - ConnectionStrings__DefaultConnection=server=payroll-db;port=3306;database=payrolldb;user=root;password=123456789Mquan@;
      - HrService__BaseUrl=https://172.16.6.17:7084
      - HrService__EmployeesEndpoint=/api/v1/hr/Employees
      - HrService__EmployeeByIdEndpoint=/api/v1/hr/Employees/{id}
      - HrService__ContractsEndpoint=/api/contracts
      - HrService__ContractTypesEndpoint=/api/contracts/types
      - AttendanceService__BaseUrl=https://172.16.6.18:7108
      - Jwt__Secret=HrCore_BTL_7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f
      - Jwt__Issuer=UserAuthService
      - Jwt__Audience=AllMicroservices
      - Jwt__ExpiryMinutes=60
      - Email__SmtpHost=smtp.gmail.com
      - Email__SmtpPort=587
      - Email__Username=your-email@gmail.com
      - Email__Password=your-app-password
      - Email__FromEmail=your-email@gmail.com
      - Email__FromName=Phòng Nhân sự - HRM System
    depends_on:
      payroll-db:
        condition: service_healthy

volumes:
  payroll-db-data: